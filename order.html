<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
         <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>Order</title>
        <link href="css/reset.css" rel="stylesheet" type="text/css" />
        <link href="css/styles-order.css" rel="stylesheet" type="text/css" />
        <script type="text/javascript" src="js/jquery-3.7.1.min.js"></script>
        <script type="text/javascript" src="js/jquery.easing.1.3.js" ></script>
    </head>
    <body>

          <div class="container">

                    <div class="header">

                                 <div class="headerText">

                                    <a href="index.html"><div class="logo"></div></a>

                                    <a href="dashboard.html"><div class="arrowOrder"></div></a>
                                    
                                </div>
                     </div>


            <div class="mainHolder">

                <div class="signUp">
                            <h1>ORDER</h1>
                </div>


                <div class="textSection">
                        

                        <div class="groupText">

                                <div class="boxHolderOne">
                                    <div class="textPlusOne">
                                        <h2>Select Design</h2>
                                        <p>You can select from one of your saved designs or pick out a part to order.</p>
                                    </div>
                                    <div class="custom-select-wrapper">
                                      <select class="custom-select">
                                        <option value="1">Custom Blade 1.0</option>
                                        <option value="2">Custom Socket 2.0</option>
                                      </select>
                                    </div>

                                </div>
                                <div class="boxHolderTwo">
                                    <div class="textPlusOne">
                                        <h2>Select Location</h2>
                                        <p>Select a FabLab that is close to your location. </p>
                                    </div>
                                    <div class="custom-select-wrapper">
                                      <div class="map2">
                                          <button class="polygon"></button>
                                          <button class="polygon2"></button>
                                      </div>
                                    </div>
                                </div>
                            
                                <div class="fieldHolderOne">
                                    <h2>Email</h2>
                                    <input id="firstName" type="text" placeholder="Email">
                                </div>

                                 <div class="fieldHolderTwo">
                                    <h2>Number</h2>
                                    <input id="email" type="text" placeholder="Phone">
                                </div>


                                <div class="checkoutButton">Continue</div>

                               

                        </div>
                
                </div>

                 <div class="textSectionTwo" style="display: none;">
                        

                        <div class="groupText">

                            

                                


                                <div class="checkoutButton">Continue</div>

                               

                        </div>
                
                </div>
                    
        </div>
</div>
    
    	
        
        <script type="text/javascript" src="js/custom_behaviors.js"></script>
    </body>
</html>
